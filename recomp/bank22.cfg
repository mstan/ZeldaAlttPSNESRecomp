# bank22.cfg — qwertymodo MSU-1 audio driver (feat/msu-1 integration)
#
# Bank $22 ($22:8000-$22:FFFF, file region ~0x110000) holds the MSU-1
# driver injected by alttp_msu.ips into the expanded ROM. Vanilla ALttP
# has no bank $22, so without this cfg the recompiler routes the patch's
# `JSL $22Exxx` hooks (placed in banks $00-$0E) to unresolved trap stubs
# and the music engine breaks. These funcs are exactly the JSL/JSR/JML
# targets in alttp_msu.asm (addresses are within-bank 16-bit).

bank = 22

func MsuSetLoop     e880 end:e900
func MsuMain        e900 end:e910
func MsuLoad        e910 end:e950
func MsuCheck       e950 end:e970
func MsuSpcPlay     e970 end:e990
func MsuTrackSelect e990 end:e9f0
func MsuFadeOut     e9f0 end:ea20
func MsuMapOpen     ea20 end:ea50
func MsuFullVolume  ea50 end:ea80
func MsuEnterHouse  ea80 end:eb00
func MsuIngameChange eb00 end:ec80
func MsuGreatFairy  ec80 end:edd0
func MsuStore0130   edd0 end:edd7
func MsuBossVictory edd7 end:ee30
func MsuPlay        ee30 end:10000
