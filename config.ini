[General]
Autosave = 0
DisableFrameDelay = 0
# Skip the launcher and boot straight to the game (the launcher's "Skip Launcher
# on Boot" toggle sets this). Run with --launcher, or set this back to 0, to show it.
SkipLauncher = 0

[Graphics]
WindowSize = Auto
Fullscreen = 0
WindowScale = 3
NewRenderer = 1
IgnoreAspectRatio = 0
NoSpriteLimits = 1
; Widescreen: extra columns rendered per side (0 = authentic 256-wide, off).
; Internal width becomes 256 + 2*Widescreen, clamped to 95. ~71 ≈ 16:9 at
; 224 lines. Opt-in enhancement; backgrounds widen out to the real room edge
; and pillarbox where there is nothing valid to show. Default off.
Widescreen = 0

[Sound]
EnableAudio = 1
AudioFreq = 32040
AudioChannels = 2
AudioSamples = 512

[KeyMap]
Fullscreen = Alt+Return
Reset = Ctrl+r
Pause = Shift+p
PauseDimmed = p
Turbo = Tab
WindowBigger = Ctrl+Up
WindowSmaller = Ctrl+Down
VolumeUp = Shift+=
VolumeDown = Shift+-
Load =      F1,     F2,     F3,     F4,     F5,     F6,     F7,     F8,     F9,     F10
Save = Shift+F1,Shift+F2,Shift+F3,Shift+F4,Shift+F5,Shift+F6,Shift+F7,Shift+F8,Shift+F9,Shift+F10

[GamepadMap]
EnableGamepad1 = true
EnableGamepad2 = true
Controls =   DpadUp, DpadDown, DpadLeft, DpadRight, Back, Start, B, A, Y, X, Lb, Rb
ControlsP2 = DpadUp, DpadDown, DpadLeft, DpadRight, Back, Start, B, A, Y, X, Lb, Rb
